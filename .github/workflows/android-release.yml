name: Android APK Release

on:
  push:
    branches:
      - main
  release:
    types: [published]

# Minimal permissions; the release job upgrades to contents:write when needed.
permissions:
  contents: read

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    # Grant write access to release assets only when publishing a release.
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        # CI uses ./gradlew directly; gradle21w is a local developer alias only.
        run: chmod +x shelfscan/gradlew

      - name: Build debug APK
        working-directory: shelfscan
        run: ./gradlew :androidApp:assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shelfscan-debug-apk
          path: shelfscan/androidApp/build/outputs/apk/debug/*-debug.apk
          retention-days: 30

      # -----------------------------------------------------------------------
      # Release builds: sign the APK using secrets stored in the repository.
      #
      # Required repository secrets:
      #   KEYSTORE_BASE64   – Base64-encoded .jks / .keystore file
      #   KEYSTORE_PASSWORD – Password for the keystore
      #   KEY_ALIAS         – Alias of the signing key
      #   KEY_PASSWORD      – Password for the signing key
      # -----------------------------------------------------------------------
      - name: Decode keystore
        if: github.event_name == 'release'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > /tmp/release.keystore

      - name: Build release APK
        if: github.event_name == 'release'
        working-directory: shelfscan
        env:
          KEYSTORE_PATH: /tmp/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :androidApp:assembleRelease --no-daemon

      - name: Upload release APK artifact
        if: github.event_name == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: shelfscan-release-apk
          path: shelfscan/androidApp/build/outputs/apk/release/*-release.apk
          retention-days: 90

      - name: Attach release APK to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: shelfscan/androidApp/build/outputs/apk/release/*-release.apk
